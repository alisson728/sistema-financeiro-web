services:
  - type: web
    name: financeiro-pessoal-web
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --workers 1 backend.app:app
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financeiro-pessoal-db
          property: connectionString
      - key: RUN_REMINDER_THREAD
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.11"

databases:
  - name: financeiro-pessoal-db
    plan: free
    databaseName: financeiro_pessoal
    user: financeiro_user
